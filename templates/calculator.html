{% extends "base.html" %}
{% block content %}

<style>
  .calc-wrapper {
    max-width: 500px;
    margin: 40px auto;
    padding: 0 20px;
    font-family: sans-serif;
  }

  .calc-subtitle {
    color: #666;
  }

  .calc-input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .calc-input {
    flex: 1;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 15px;
  }

  .calc-button {
    padding: 10px 20px;
    background: #0071e3;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
  }

  .calc-result {
    background: #f9f9f9;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 16px;
    min-height: 50px;
    font-size: 18px;
  }

  .calc-history {
    margin-top: 24px;
  }

  .calc-history-list {
    list-style: none;
    padding: 0;
  }

  .calc-history-item {
    padding: 8px 12px;
    background: #e5e5ea;
    border-radius: 8px;
    margin-bottom: 8px;
    cursor: pointer;
  }
</style>

<div class="calc-wrapper">
  <h2>🧮 Calculator</h2>
  <p class="calc-subtitle">Enter a mathematical expression and hit Calculate.</p>

  <div class="calc-input-row">
    <input
      id="expression"
      type="text"
      placeholder="e.g. (3 + 5) * 2"
      class="calc-input"
    />
    <button onclick="calculate()" class="calc-button">
      Calculate
    </button>
  </div>

  <div id="result" class="calc-result">
    Result will appear here...
  </div>

  <div id="history" class="calc-history">
    <h3>History</h3>
    <ul id="history-list" class="calc-history-list"></ul>
  </div>
</div>

<script>
  let calcHistory = [];

  async function calculate() {
    const input = document.getElementById("expression");
    const resultBox = document.getElementById("result");
    const expression = input.value.trim();

    if (!expression) return;

    resultBox.textContent = "Calculating...";

    const res = await fetch("/api/calculate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ expression })
    });

    const data = await res.json();

    resultBox.textContent = `${expression} = ${data.result}`;

    calcHistory.unshift({ expression, result: data.result });
    renderHistory();

    input.value = "";
    input.focus();
  }

  function renderHistory() {
    const list = document.getElementById("history-list");
    list.innerHTML = calcHistory.map(item => `
      <li
        class="calc-history-item"
        onclick="document.getElementById('expression').value = '${item.expression}'"
      >
        ${item.expression} = ${item.result}
      </li>
    `).join("");
  }

  document.getElementById("expression").addEventListener("keydown", function(e) {
    if (e.key === "Enter") calculate();
  });
</script>

{% endblock %}
